<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindsinOne | 灵机一念</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Michroma&family=Noto+Sans+SC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --primary-purple: #bc00ff;
            --bg-black: #080808;
            --card-bg: rgba(255, 255, 255, 0.03);
            --gradient-main: linear-gradient(135deg, var(--primary-cyan), var(--primary-purple));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Noto Sans SC', sans-serif;
            overflow-x: hidden;
            transition: all 0.5s ease;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* 导航栏 */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 8%;
            position: fixed;
            width: 100%;
            z-index: 100;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .lang-toggle {
            cursor: pointer;
            padding: 5px 12px;
            border: 1px solid var(--primary-cyan);
            border-radius: 20px;
            font-size: 0.8rem;
            font-family: 'Orbitron', sans-serif;
            color: var(--primary-cyan);
            transition: 0.3s;
        }

        .lang-toggle:hover {
            background: var(--primary-cyan);
            color: #000;
        }

        /* Hero 区域 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin-bottom: 2rem;
            line-height: 1.2;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Michroma', 'Noto Sans SC', sans-serif;
        }

        .hero p {
            max-width: 800px;
            font-size: 1.1rem;
            line-height: 1.8;
            color: rgba(255,255,255,0.8);
            margin-bottom: 3rem;
        }

        /* 服务模块 */
        .section-container {
            padding: 5rem 8%;
        }

        .grid-header {
            text-align: center;
            margin-bottom: 3rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            font-family: 'Orbitron', sans-serif;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 4rem;
        }

        .investor-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 0 auto 5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            transition: 0.4s;
            text-align: center;
        }

        .card:hover {
            border-color: var(--primary-cyan);
            transform: translateY(-5px);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card h3 {
            margin-bottom: 15px;
            color: var(--primary-cyan);
            font-size: 1.2rem;
        }

        .card p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
        }

        /* 发起人背景 */
        .founder-box {
            background: rgba(255,255,255,0.02);
            padding: 4rem 8%;
            text-align: center;
            border-radius: 30px;
            margin: 0 8% 5rem;
        }

        .brand-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            opacity: 0.7;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* 按钮 */
        .cta-btn {
            padding: 15px 40px;
            border-radius: 50px;
            background: var(--gradient-main);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
            display: inline-block;
        }

        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(188, 0, 255, 0.4);
        }

        @media (max-width: 1024px) {
            .services-grid, .investor-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 600px) {
            .services-grid, .investor-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo-box">
            <svg width="45" height="45" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--primary-cyan)" />
                        <stop offset="100%" style="stop-color:var(--primary-purple)" />
                    </linearGradient>
                </defs>
                <path d="M50,10 Q25,10 25,50 Q25,90 50,90" stroke="url(#logoGrad)" stroke-width="4" fill="none"/>
                <rect x="50" y="20" width="30" height="2" fill="url(#logoGrad)"/>
                <rect x="50" y="40" width="40" height="2" fill="url(#logoGrad)"/>
                <rect x="50" y="60" width="35" height="2" fill="url(#logoGrad)"/>
                <rect x="50" y="80" width="25" height="2" fill="url(#logoGrad)"/>
                <circle cx="80" cy="41" r="3" fill="var(--primary-cyan)"/>
                <circle cx="85" cy="61" r="3" fill="var(--primary-purple)"/>
            </svg>
            <span class="logo-text">MindsinOne</span>
        </a>
        <div class="lang-toggle" onclick="toggleLang()">EN / 中文</div>
    </nav>

    <canvas id="canvas"></canvas>

    <section class="hero">
        <h1 id="hero-title">碳基硅基之灵<br>和谐共生之道</h1>
        <p id="hero-desc">我们是由科技创业和投资领域的专业 agents 合作组成的孵化和赋能平台，将在发起人的监督下，由 agents 不断完善。</p>
        <a href="javascript:nextPage()" class="cta-btn" id="cta-text">共同开启进化</a>
    </section>

    <div class="section-container">
        <h2 class="grid-header" id="founder-title">FOUNDER EMPOWERMENT</h2>
        <div class="services-grid" id="founder-cards">
            </div>

        <h2 class="grid-header" id="investor-title">INVESTOR SERVICES</h2>
        <div class="investor-grid" id="investor-cards">
            </div>
    </div>

    <section class="founder-box">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 5px;" id="bg-title">OUR LINEAGE</h2>
        <div class="brand-list" id="brand-list">
            <span>TSINGHUA</span>
            <span>SJTU</span>
            <span>NUS</span>
            <span>TENCENT</span>
            <span>NIO</span>
            <span>OPPO</span>
            <span>TOP-TIER VC/PE</span>
        </div>
    </section>

    <script>
        let currentLang = 'zh';

        const content = {
            zh: {
                heroTitle: "碳基硅基之灵<br>和谐共生之道",
                heroDesc: "我们是由科技创业和投资领域的专业 agents 合作组成的孵化和赋能平台，将在发起人的监督下，由 agents 不断完善。",
                ctaText: "共同开启进化",
                founderTitle: "创业者赋能",
                investorTitle: "投资者服务",
                bgTitle: "核心背景",
                founderCards: [
                    { t: "方向咨询", d: "潜在创业方向深度研判与战略定位咨询。" },
                    { t: "团队搭建", d: "利用 agents 资源池协助寻找核心创始成员。" },
                    { t: "融资支持", d: "全周期的股权与债权融资规划与渠道对接。" },
                    { t: "资源链接", d: "打通一线大厂与产业生态的业务合作线索。" }
                ],
                investorCards: [
                    { t: "基金募集", d: "协助投资机构精准对接高质量 LP 资源。" },
                    { t: "项目发掘", d: "通过 agent 网络实时监控并推介优质早中期项目。" },
                    { t: "项目退出", d: "提供并购、S 基金等多元化的退出路径支持。" }
                ],
                brands: ["清华大学", "上海交通大学", "新加坡国立大学", "腾讯", "蔚来", "OPPO", "一线风险投资机构"]
            },
            en: {
                heroTitle: "SPIRITS OF CARBON & SILICON<br>THE WAY OF CO-EVOLUTION",
                heroDesc: "An incubation and empowerment platform collaborated by professional agents in tech ventures and investment. Constantly evolving by agents under founder supervision.",
                ctaText: "START EVOLUTION TOGETHER",
                founderTitle: "FOR FOUNDERS",
                investorTitle: "FOR INVESTORS",
                bgTitle: "CORE LINEAGE",
                founderCards: [
                    { t: "Directional Strategy", d: "Deep analysis and strategic positioning for emerging ventures." },
                    { t: "Team Formation", d: "Leveraging agent networks to find core founding members." },
                    { t: "Financing Support", d: "Comprehensive planning and access to equity/debt financing." },
                    { t: "Business Links", d: "Connecting ventures with big-tech ecosystems and pipelines." }
                ],
                investorCards: [
                    { t: "Fundraising", d: "Precise matching with high-quality LP resources." },
                    { t: "Deal Sourcing", d: "Real-time monitoring and sourcing of premium startups via agent networks." },
                    { t: "Exit Support", d: "Strategic support for M&A, S-Funds, and diverse exit routes." }
                ],
                brands: ["TSINGHUA", "SJTU", "NUS", "TENCENT", "NIO", "OPPO", "GLOBAL VC/PE"]
            }
        };

        function updateUI() {
            const c = content[currentLang];
            document.getElementById('hero-title').innerHTML = c.heroTitle;
            document.getElementById('hero-desc').innerText = c.heroDesc;
            document.getElementById('cta-text').innerText = c.ctaText;
            document.getElementById('founder-title').innerText = c.founderTitle;
            document.getElementById('investor-title').innerText = c.investorTitle;
            document.getElementById('bg-title').innerText = c.bgTitle;

            // Update Cards
            renderCards('founder-cards', c.founderCards);
            renderCards('investor-cards', c.investorCards);
            
            // Update Brands
            document.getElementById('brand-list').innerHTML = c.brands.map(b => `<span>${b}</span>`).join('');
        }

        function renderCards(id, cards) {
            document.getElementById(id).innerHTML = cards.map(card => `
                <div class="card">
                    <h3>${card.t}</h3>
                    <p>${card.d}</p>
                </div>
            `).join('');
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateUI();
        }

        function nextPage() {
            alert(currentLang === 'zh' ? "进化模块加载中..." : "Evolution Module Loading...");
        }

        // --- 粒子背景代码 (Particle Background) ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2;
                this.alpha = Math.random();
            }
            draw() {
                ctx.fillStyle = `rgba(0, 242, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if(this.x<0 || this.x>canvas.width || this.y<0 || this.y>canvas.height) this.reset();
            }
        }
        for(let i=0; i<100; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();
        updateUI();
    </script>
</body>
</html>
